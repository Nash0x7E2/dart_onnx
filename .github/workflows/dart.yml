# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ORT_VERSION: "1.20.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Note: This workflow uses the latest stable version of the Dart SDK.
      # You can specify other versions if desired, see documentation here:
      # https://github.com/dart-lang/setup-dart/blob/main/README.md
      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      - name: Install dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos

      # Download the ONNX Runtime shared library for Linux so that tests
      # that load the native library via FFI can find it.
      - name: Download ONNX Runtime (Linux x64)
        run: |
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            -o ort.tgz
          tar -xzf ort.tgz
          echo "ORT_LIB_PATH=$(pwd)/onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" >> "$GITHUB_ENV"

      # Uncomment this step to verify the use of 'dart format' on each commit.
      # - name: Verify formatting
      #   run: melos run format

      # Consider passing '--fatal-infos' for slightly stricter analysis.
      - name: Analyze project source
        run: melos run analyze

      - name: Run tests
        env:
          DART_ONNX_LIB_PATH: ${{ env.ORT_LIB_PATH }}
        run: melos run test
